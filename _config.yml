title: Shepherd's Grid
description: AI&技术相关 · 智能家居 · 生活与旅行 · F1 · MI
baseurl: ""
url: "https://Leclerc423.github.io"
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 静态页面配置
include:
  - categories

# 文章配置
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title.html
  pages:
    output: true

# 首页配置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: default
      pinned: false
      tag: "文章"
      tag_type: tech
  - scope:
      path: "categories"
      type: "pages"
    values:
      layout: default

# GitHub Actions 配置
plugins:
  - jekyll-github-metadata
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

safe: false
lsi: false
encoding: "utf-8"
