title: Shepherd's Grid
description: AI&技术相关 · 智能家居 · 生活与旅行 · F1 · MI
baseurl: ""
url: "https://Leclerc423.github.io"
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 静态页面配置
include:
  - categories
  - .htaccess

# 首页配置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: default
      pinned: false
      tag: "文章"
      tag_type: tech
  - scope:
      path: "categories"
      type: "pages"
    values:
      layout: default

# 分类配置
category_names:
  ai-tech: "AI 技术"
  finance: "财经"
  life-travel: "生活"
  game-log: "游戏"

# 启用分类功能
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title.html
  pages:
    output: true

# 按分类排序文章
permalink: /:categories/:year/:month/:day/:title.html

# 首页显示文章数
paginate: 10

# 首页排序（按日期降序）
paginate_path: "/page:num/"

# 按日期排序
timezone: Asia/Shanghai

# GitHub Actions 配置
plugins:
  - jekyll-github-metadata
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

safe: false
lsi: false
encoding: "utf-8"
