title: Shepherd's Grid
description: AI&技术相关 · 智能家居 · 生活与旅行 · F1 · MI
baseurl: ""
url: "https://Leclerc423.github.io"
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 定义分类文章的 collection
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title/
  pages:
    output: true

# 设置默认值
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: default
      category: all
      pinned: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# GitHub Actions 配置
plugins:
  - jekyll-github-metadata
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

include:
  - index.md

safe: false
lsi: false
encoding: "utf-8"
