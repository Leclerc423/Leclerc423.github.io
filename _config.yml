# _config.yml 完整配置
title: Shepherd's Grid | F1 × Apple Style
email: your-email@example.com
description: "AI&技术相关 · 智能家居 · 生活与旅行 · F1 · MI"
baseurl: ""
url: "https://Leclerc423.github.io"
twitter_username: your_username
github_username: Leclerc423

# Jekyll核心配置
markdown: kramdown
theme: null  # 禁用默认主题，自定义极简样式
permalink: /:categories/:title.html
exclude: [Gemfile, README.md, node_modules, gulpfile.js, package.json]

# 自定义变量（F1+苹果风格）
f1_style:
  primary_color: "#E10000"  # F1经典红
  secondary_color: "#1A1A1A" # 苹果深空灰
  accent_color: "#FFFFFF"    # 苹果纯白
  font_primary: "SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" # 苹果官方字体
  font_f1: "Formula1 Display, SF Pro Display, sans-serif" # F1专属字体（需引入）
  border_radius: "8px"       # 苹果极简圆角
  transition: "0.3s ease-in-out" # 丝滑过渡（F1速度感）