title: Shepherd's Grid
description: AI&技术相关 · 智能家居 · 生活与旅行 · F1 · MI
baseurl: ""
url: "https://Leclerc423.github.io"
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 使用标准的 _posts 目录
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title.html

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: default
      pinned: false
      tag: "文章"
      tag_type: tech

# GitHub Actions 配置
plugins:
  - jekyll-github-metadata
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

include:
  - index.md

safe: false
lsi: false
encoding: "utf-8"
