title: Shepherd’s Grid
description: AI&技术相关 · 智能家居 · 生活与旅行 · F1 · MI
baseurl: ""
url: "https://Leclerc423.github.io"
permalink: /article/:categories/:title.html
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 文章集合配置（关键：识别所有属性）
collections:
  articles:
    output: true
    permalink: /article/:path.html
    # 定义文章默认属性
    defaults:
      - scope:
          path: "article"
          type: "articles"
        values:
          pinned: false  # 默认不置顶
          tag_type: "tech" # 默认标签类型（tech/life）
# 修复 GitHub Actions 构建的关键配置
plugins:
  - jekyll-github-metadata
  - jekyll-feed

# 禁用不必要的功能，加快构建
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
# 强制 Jekyll 解析根目录的 index.md
include:
  - index.md

# 关闭不必要的功能，避免冲突
safe: false
lsi: false
# 确保编码正确
encoding: "utf-8"